layer=overlay
output=
anchor=top-right
edge-margin-vertical=10
edge-margin-horizontal=10
notification-margin=8
min-width=300
max-width=500
icon-theme=Adwaita
max-icon-size=32
stacking-order=top-down
background=282828ff
border-color=458588ff
border-size=2
border-radius=4
padding-vertical=10
padding-horizontal=15
summary-font=monospace:size=11:weight=bold
summary-color=ebdbb2ff
summary-format=<b>%s\n</b>
body-font=monospace:size=11
body-color=ebdbb2ff
body-format=%b
default-timeout=5

[low]
border-color=a89984ff
[normal]
border-color=458588ff
[critical]
border-color=cc241dff
default-timeout=0
